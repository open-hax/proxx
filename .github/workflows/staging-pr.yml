name: staging-pr

on:
  pull_request:
    branches:
      - staging

jobs:
  staging-lint:
    name: staging-lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: eslint complexity check
        run: pnpm run lint:errors

  staging-typecheck:
    name: staging-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  staging-unit-tests:
    name: staging-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  staging-coverage:
    name: staging-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm run test:coverage
      - name: Enforce coverage threshold (80% statements on lib/)
        run: |
          TOTAL=$(node -e "
            const s = require('./coverage/coverage-summary.json').total;
            process.stdout.write(String(s.lines.pct));
          ")
          THRESHOLD=80
          if awk "BEGIN { exit !($TOTAL >= $THRESHOLD) }"; then
            echo "✅ Coverage ${TOTAL}% meets threshold ${THRESHOLD}%"
          else
            echo "❌ Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-coverage-report
          path: coverage/
          retention-days: 14
