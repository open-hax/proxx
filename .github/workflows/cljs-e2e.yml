name: cljs-e2e

on:
  pull_request:
    branches:
      - main
      - staging
    paths:
      - 'src/proxx/**'
      - 'test/proxx/e2e/**'
      - 'shadow-cljs.edn'
      - '.github/workflows/cljs-e2e.yml'
  push:
    branches:
      - main
      - staging
    paths:
      - 'src/proxx/**'
      - 'test/proxx/e2e/**'
      - 'shadow-cljs.edn'

permissions:
  contents: read
  checks: write

jobs:
  cljs-e2e:
    name: cljs-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/cache@v4
        with:
          path: |
            .shadow-cljs
            ~/.m2/repository
          key: shadow-cljs-${{ runner.os }}-${{ hashFiles('shadow-cljs.edn') }}
          restore-keys: shadow-cljs-${{ runner.os }}-

      - name: Install shadow-cljs
        run: npm install -g shadow-cljs

      - name: Compile e2e tests
        run: shadow-cljs compile node-e2e

      - name: Run e2e tests
        run: node target/node-e2e.cjs
